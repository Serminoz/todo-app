<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    li:last-child {
      border-bottom: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #aaa;
    }

    li .edit-btn,
    li .delete-btn {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      transition: color 0.2s;
      padding: 2px 6px;
      border-radius: 4px;
    }

    li .edit-btn {
      color: #ccc;
    }

    li .edit-btn:hover {
      color: #6c63ff;
    }

    li .delete-btn {
      color: #ccc;
      font-size: 1.1rem;
    }

    li .delete-btn:hover {
      color: #e74c3c;
    }

    li .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 2px solid #6c63ff;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    li .save-btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    li .save-btn:hover {
      background: #574fd6;
    }

    li .cancel-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    li .cancel-btn:hover {
      color: #e74c3c;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #aaa;
    }

    .footer button {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .loading {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 24px 0;
    }

    .error-msg {
      background: #fff0f0;
      color: #e74c3c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>

    <div id="errorMsg" class="error-msg"></div>

    <div class="input-row">
      <input id="taskInput" type="text" placeholder="Yeni görev ekle..." maxlength="120">
      <button onclick="addTask()">+</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Devam Eden</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul id="taskList"></ul>
    <p id="loadingMsg" class="loading">Yükleniyor...</p>
    <p id="emptyMsg" class="empty" style="display:none">Henüz görev yok.</p>

    <div class="footer">
      <span id="countMsg"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://tgwsexnnelsntvlnsxii.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnd3NleG5uZWxzbnR2bG5zeGlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NjEzMDAsImV4cCI6MjA5MjMzNzMwMH0.kJb1hHVEjge4Hu14bT8siIisNWxYR3s45QcdgM10-5Y';

    const headers = {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let tasks  = [];
    let filter = 'all';

    const input      = document.getElementById('taskInput');
    const list       = document.getElementById('taskList');
    const emptyMsg   = document.getElementById('emptyMsg');
    const loadingMsg = document.getElementById('loadingMsg');
    const countMsg   = document.getElementById('countMsg');
    const errorMsg   = document.getElementById('errorMsg');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      setTimeout(() => errorMsg.style.display = 'none', 4000);
    }

    async function api(path, method = 'GET', body) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        method,
        headers,
        body: body ? JSON.stringify(body) : undefined
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || res.statusText);
      }
      if (res.status === 204) return [];
      return res.json();
    }

    async function loadTasks() {
      try {
        tasks = await api('todos?select=*&order=created_at.asc');
      } catch (e) {
        showError('Görevler yüklenemedi: ' + e.message);
      } finally {
        loadingMsg.style.display = 'none';
        render();
      }
    }

    async function addTask() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      try {
        const [created] = await api('todos', 'POST', { text, done: false });
        tasks.push(created);
        render();
      } catch (e) {
        showError('Görev eklenemedi: ' + e.message);
        input.value = text;
      }
    }

    async function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const newDone = !t.done;
      t.done = newDone;
      render();
      try {
        await api(`todos?id=eq.${id}`, 'PATCH', { done: newDone });
      } catch (e) {
        t.done = !newDone;
        showError('Güncellenemedi: ' + e.message);
        render();
      }
    }

    function startEdit(id) {
      const li = document.querySelector(`li[data-id="${id}"]`);
      const t  = tasks.find(t => t.id === id);
      if (!li || !t) return;

      li.innerHTML = `
        <input type="checkbox" ${t.done ? 'checked' : ''} disabled>
        <input class="edit-input" type="text" value="${escHtml(t.text)}" maxlength="120">
        <button class="save-btn" onclick="saveEdit(${id})">Kaydet</button>
        <button class="cancel-btn" onclick="render()" title="İptal">&#x2715;</button>
      `;

      const editInput = li.querySelector('.edit-input');
      editInput.focus();
      editInput.select();
      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter')  saveEdit(id);
        if (e.key === 'Escape') render();
      });
    }

    async function saveEdit(id) {
      const li        = document.querySelector(`li[data-id="${id}"]`);
      const editInput = li && li.querySelector('.edit-input');
      const newText   = editInput ? editInput.value.trim() : '';
      if (!newText) return;
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const oldText = t.text;
      t.text = newText;
      render();
      try {
        await api(`todos?id=eq.${id}`, 'PATCH', { text: newText });
      } catch (e) {
        t.text = oldText;
        showError('Düzenlenemedi: ' + e.message);
        render();
      }
    }

    async function deleteTask(id) {
      const prev = [...tasks];
      tasks = tasks.filter(t => t.id !== id);
      render();
      try {
        await api(`todos?id=eq.${id}`, 'DELETE');
      } catch (e) {
        tasks = prev;
        showError('Silinemedi: ' + e.message);
        render();
      }
    }

    async function clearDone() {
      const prev = [...tasks];
      const doneIds = tasks.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      tasks = tasks.filter(t => !t.done);
      render();
      try {
        await api(`todos?id=in.(${doneIds.join(',')})`, 'DELETE');
      } catch (e) {
        tasks = prev;
        showError('Silinemedi: ' + e.message);
        render();
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const visible = tasks.filter(t =>
        filter === 'all'    ? true :
        filter === 'active' ? !t.done :
                               t.done
      );

      list.innerHTML = '';
      visible.forEach(t => {
        const li = document.createElement('li');
        li.setAttribute('data-id', t.id);
        if (t.done) li.classList.add('done');
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
          <span>${escHtml(t.text)}</span>
          <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#x270E;</button>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Sil">&#x2715;</button>
        `;
        list.appendChild(li);
      });

      const remaining = tasks.filter(t => !t.done).length;
      countMsg.textContent = `${remaining} görev kaldı`;
      emptyMsg.style.display = visible.length === 0 ? 'block' : 'none';
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadTasks();
  </script>
</body>
</html>
